<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔗 Hybrid Link Shortener (JSONBin Fixed)</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f1115; color: #e6e6e6; min-height: 100vh; padding: 20px 16px; display: flex; justify-content: center; align-items: flex-start; }
  .wrap { width: 100%; max-width: 100%; margin: 0 auto; }
  h1 { font-size: 22px; font-weight: 600; margin-bottom: 6px; color: #fff; text-align: center; }
  p.sub { color: #8a8f98; font-size: 14px; margin-bottom: 24px; text-align: center; }
  .tabs { display: flex; gap: 6px; margin-bottom: 20px; background: #1a1d24; padding: 4px; border-radius: 10px; }
  .tab { flex: 1; text-align: center; padding: 12px 0; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; color: #8a8f98; transition: all 0.2s ease; }
  .tab.active { background: #6366f1; color: #fff; }
  .panel { display: none; width: 100%; }
  .panel.active { display: block !important; }
  .form { display: flex; flex-direction: column; gap: 10px; margin-bottom: 16px; width: 100%; }
  input[type=text] { width: 100%; padding: 14px; border-radius: 10px; border: 1px solid #2a2d35; background: #1a1d24; color: #fff; font-size: 15px; outline: none; transition: border 0.2s; }
  input[type=text]:focus { border-color: #6366f1; }
  button { width: 100%; padding: 14px 20px; border-radius: 10px; border: none; background: #6366f1; color: #fff; font-weight: 600; font-size: 15px; cursor: pointer; transition: background 0.2s; }
  button:hover { background: #5457e6; }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  .expiry-row { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; justify-content: center; }
  .exp-opt { flex: 1; min-width: 75px; text-align: center; padding: 10px 8px; border-radius: 8px; border: 1px solid #2a2d35; background: #1a1d24; color: #8a8f98; font-size: 13px; cursor: pointer; }
  .exp-opt.selected { background: #6366f1; border-color: #6366f1; color: #fff; }
  #list { display: grid; grid-template-columns: 1fr; gap: 14px; margin-top: 20px; }
  .item { background: #1a1d24; border: 1px solid #2a2d35; border-radius: 12px; padding: 16px; display: flex; flex-direction: column; gap: 8px; }
  .item.expired { opacity: 0.45; }
  .short { font-size: 16px; font-weight: 600; color: #a5b4fc; word-break: break-all; }
  .orig { font-size: 13px; color: #8a8f98; word-break: break-all; }
  .row { display: flex; flex-direction: column; gap: 12px; margin-top: 6px; border-top: 1px solid #2a2d35; padding-top: 12px; }
  .meta { font-size: 12px; color: #6b7280; }
  .meta .exp-soon { color: #fbbf24; }
  .meta .exp-done { color: #f87171; }
  .actions { display: flex; gap: 8px; width: 100%; }
  .actions button { flex: 1; padding: 10px; font-size: 13px; background: #2a2d35; }
  .actions button:hover { background: #363a45; }
  .actions .del { background: #3a1f24; color: #f87171; }
  .actions .del:hover { background: #4a252b; }
  .empty { color: #6b7280; text-align: center; padding: 30px 0; font-size: 15px; }
  .result-box { background: #14201c; border: 1px solid #22553f; border-radius: 10px; padding: 16px; margin-top: 16px; font-size: 14px; display: flex; justify-content: space-between; align-items: center; gap: 12px; word-break: break-all; }
  .result-box .url-text { flex: 1; display: flex; flex-direction: column; gap: 4px; }
  .result-box a { color: #6ee7b7; text-decoration: none; font-weight: 500; word-break: break-all; }
  .result-box button { padding: 8px 14px; font-size: 12px; background: #22553f; color: #fff; border: none; border-radius: 6px; cursor: pointer; white-space: nowrap; width: auto; }
  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #1f2937; color: #fff; padding: 12px 24px; border-radius: 8px; font-size: 14px; opacity: 0; transition: opacity 0.2s; pointer-events: none; z-index: 1000; }
  .toast.show { opacity: 1; }
  .empty { color: #6b7280; text-align: center; padding: 30px 0; font-size: 15px; }
  @media (min-width: 600px) { body { padding: 40px 24px; } .wrap { max-width: 650px; } h1 { font-size: 26px; text-align: left; } p.sub { text-align: left; font-size: 15px; } .form { flex-direction: row; } input[type=text] { flex: 1; } button { width: auto; white-space: nowrap; } .row { flex-direction: row; justify-content: space-between; align-items: center; } .actions { width: auto; } .actions button { flex: none; width: 70px; } }
  @media (min-width: 1024px) { .wrap { max-width: 1000px; } #list { grid-template-columns: 1fr 1fr; gap: 16px; } h1 { font-size: 32px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>🔗 Hybrid Link Shortener (JSONBin)</h1>
  <p class="sub">Uses dynamic online API bins to sync links across different machines safely.</p>
  
  <div class="tabs">
    <div class="tab active" data-tab="shorten">Shorten Link</div>
    <div class="tab" data-tab="unshorten">Decode / Unshorten</div>
  </div>
  
  <div class="panel active" id="panel-shorten">
    <div class="form"><input type="text" id="urlInput" placeholder="https://example.com" /><button id="shortenBtn">Shorten URL</button></div>
    <div class="expiry-row" id="expiryRow"></div>
  </div>
  
  <div class="panel" id="panel-unshorten">
    <div class="form"><input type="text" id="unshortInput" placeholder="Paste link or code" /><button id="unshortBtn">Find URL</button></div>
    <div id="unshortResult"></div>
  </div>
  
  <div id="list"></div>
</div>
<div class="toast" id="toast"></div>

<script>
// ⚠️ APNI DYNAMIC BIN DETAILS YAHAN BHARNA
const BIN_ID = "6a4febd3da38895dfe476f3a";
const MASTER_KEY = "$2a$10$/KBluzGUqR2SXkDDJDmNkugfJoKGwsZeud8L9T88oNS1fGKlCWoHC";
const API_URL = `https://api.jsonbin.io/v3/b/${BIN_ID}`;   // https://api.jsonbin.io/v3/b/6a4febd3da38895dfe476f3a // https://api.jsonbin.io/v3/b/6a4febd3da38895dfe476f3a

let globalLinks = {};
const toastEl = document.getElementById('toast');
const listEl = document.getElementById('list');
const expiryRow = document.getElementById('expiryRow');

const EXPIRY_OPTIONS = [
  { label: 'Never', ms: null }, { label: '1 hour', ms: 60 * 60 * 1000 },
  { label: '1 day', ms: 24 * 60 * 60 * 1000 }, { label: '7 days', ms: 7 * 24 * 60 * 60 * 1000 },
  { label: '30 days', ms: 30 * 24 * 60 * 60 * 1000 }
];
let selectedExpiry = EXPIRY_OPTIONS[2]; // default 1 day

function renderExpiryOptions() {
  expiryRow.innerHTML = EXPIRY_OPTIONS.map((opt, i) => `<div class="exp-opt ${opt.label === selectedExpiry.label ? 'selected' : ''}" data-i="${i}">${opt.label}</div>`).join('');
  expiryRow.querySelectorAll('.exp-opt').forEach(el => el.addEventListener('click', () => { selectedExpiry = EXPIRY_OPTIONS[+el.dataset.i]; renderExpiryOptions(); }));
}
renderExpiryOptions();

function showToast(msg) { toastEl.textContent = msg; toastEl.classList.add('show'); setTimeout(() => toastEl.classList.remove('show'), 1500); }

async function loadBin() {
  try {
    const res = await fetch(`${API_URL}/latest`, { headers: { "X-Master-Key": MASTER_KEY } });
    const json = await res.json();
    globalLinks = json.record || {};
    render(); checkRedirect();
  } catch (e) { console.error("Sync failed", e); }
}

async function saveBin() {
  try {
    await fetch(API_URL, { method: "PUT", headers: { "Content-Type": "application/json", "X-Master-Key": MASTER_KEY }, body: JSON.stringify(globalLinks) });
    render(); showToast('Saved globally!');
  } catch (e) { alert("API Save Error"); }
}

function escapeHtml(str) { const div = document.createElement('div'); div.textContent = str; return div.innerHTML; }

function isValidUrl(str) { try { const u = new URL(str); return u.protocol === 'http:' || u.protocol === 'https:'; } catch { return false; } }

function genCode() {
  let code = Math.random().toString(36).substring(2, 8);
  while (code.length < 6 || (globalLinks[code] && code !== "status")) {
    code = Math.random().toString(36).substring(2, 8);
  }
  return code;
}

// Old data (before this update) stored plain strings; keep working with those.
function normalizeEntry(v) {
  if (typeof v === 'string') return { url: v, created: null, expiresAt: null };
  return v;
}

function isExpired(entry) { return entry.expiresAt !== null && entry.expiresAt !== undefined && entry.expiresAt <= Date.now(); }

function formatExpiry(entry) {
  if (entry.expiresAt === null || entry.expiresAt === undefined) return 'Never expires';
  const diff = entry.expiresAt - Date.now();
  if (diff <= 0) return 'Expired';
  const mins = Math.round(diff / 60000);
  if (mins < 60) return `Expires in ${mins}m`;
  const hrs = Math.round(mins / 60);
  if (hrs < 24) return `Expires in ${hrs}h`;
  const days = Math.round(hrs / 24);
  return `Expires in ${days}d`;
}

function buildShortLink(code) {
  const base = window.location.origin + window.location.pathname;
  return base.endsWith('/') ? base + '?go=' + code : base + '/?go=' + code;
}

function render() {
  const keys = Object.keys(globalLinks).filter(k => k !== "status");
  if (keys.length === 0) { listEl.innerHTML = '<div class="empty">No active cloud links.</div>'; return; }

  listEl.innerHTML = keys.reverse().map(code => {
    const entry = normalizeEntry(globalLinks[code]);
    const expired = isExpired(entry);
    const shortDisplay = buildShortLink(code);
    const dateText = entry.created ? new Date(entry.created).toLocaleDateString('en-IN', { day: 'numeric', month: 'short' }) : '';
    const expClass = expired ? 'exp-done' : (entry.expiresAt && entry.expiresAt - Date.now() < 3600000 ? 'exp-soon' : '');
    return `
      <div class="item ${expired ? 'expired' : ''}">
        <div class="short">${escapeHtml(shortDisplay)}</div>
        <div class="orig">${escapeHtml(entry.url)}</div>
        <div class="row">
          <span class="meta">${dateText ? dateText + ' · ' : ''}<span class="${expClass}">${formatExpiry(entry)}</span></span>
          <div class="actions">
            ${!expired ? `<button onclick="copyCode('${code}')">Copy</button><button onclick="openUrl('${code}')">Open</button>` : ''}
            <button class="del" onclick="deleteLink('${code}')">Delete</button>
          </div>
        </div>
      </div>`;
  }).join('');
}

document.querySelectorAll('.tab').forEach(tab => tab.addEventListener('click', () => {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  
  tab.classList.add('active'); 
  document.getElementById('panel-' + tab.dataset.tab).classList.add('active');
  
  if(tab.dataset.tab === "shorten") {
    listEl.style.display = "grid";
  } else {
    listEl.style.display = "none";
    document.getElementById('unshortResult').innerHTML = '';
    document.getElementById('unshortInput').value = '';
  }
}));

document.getElementById('shortenBtn').addEventListener('click', async () => {
  const url = document.getElementById('urlInput').value.trim(); if(!url) return;
  if (!isValidUrl(url)) { showToast('Enter a valid http/https URL'); return; }
  const code = genCode();
  const expiresAt = selectedExpiry.ms === null ? null : Date.now() + selectedExpiry.ms;
  globalLinks[code] = { url, created: Date.now(), expiresAt };
  document.getElementById('shortenBtn').disabled = true;
  await saveBin(); 
  document.getElementById('shortenBtn').disabled = false; 
  document.getElementById('urlInput').value = '';
});

document.getElementById('unshortBtn').addEventListener('click', () => {
  const val = document.getElementById('unshortInput').value.trim(); if(!val) return;
  let code = val.includes('?go=') ? val.split('?go=')[1].split('&')[0] : val.split('/').pop();
  const resBox = document.getElementById('unshortResult');
  const entry = (globalLinks[code] && code !== "status") ? normalizeEntry(globalLinks[code]) : null;

  if(entry && !isExpired(entry)) {
    resBox.innerHTML = `<div class="result-box"><div class="url-text"><strong>Original URL:</strong><a href="${escapeHtml(entry.url)}" target="_blank">${escapeHtml(entry.url)}</a></div><button id="copyDecBtn">Copy</button></div>`;
    
    document.getElementById('copyDecBtn').addEventListener('click', () => {
      navigator.clipboard.writeText(entry.url);
      showToast('Copied!');
    });
  } else { resBox.innerHTML = '<div style="color:#f87171;font-size:14px;margin-top:10px;">Not found or expired</div>'; }
});

window.copyCode = function(code) {
  navigator.clipboard?.writeText(buildShortLink(code)).then(() => showToast('Short link copied!'));
};

window.openUrl = function(code) {
  const entry = normalizeEntry(globalLinks[code]);
  if (entry && !isExpired(entry)) window.open(entry.url, '_blank');
};

window.deleteLink = async function(code) {
  delete globalLinks[code];
  await saveBin();
  showToast('Deleted');
};

function checkRedirect() {
  const urlParams = new URLSearchParams(window.location.search);
  const code = urlParams.get('go');
  if (code && code !== "status" && globalLinks[code]) {
    const entry = normalizeEntry(globalLinks[code]);
    if (!isExpired(entry)) window.location.replace(entry.url);
  }
}
loadBin();
</script>
</body>
</html>
