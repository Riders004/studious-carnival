<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔗 Hybrid Link Shortener (Firebase Fixed)</title>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f1115; color: #e6e6e6; min-height: 100vh; padding: 20px 16px; display: flex; justify-content: center; align-items: flex-start; }
  .wrap { width: 100%; max-width: 100%; margin: 0 auto; }
  h1 { font-size: 22px; font-weight: 600; margin-bottom: 6px; color: #fff; text-align: center; }
  p.sub { color: #8a8f98; font-size: 14px; margin-bottom: 24px; text-align: center; }
  .tabs { display: flex; gap: 6px; margin-bottom: 20px; background: #1a1d24; padding: 4px; border-radius: 10px; }
  .tab { flex: 1; text-align: center; padding: 12px 0; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; color: #8a8f98; transition: all 0.2s ease; }
  .tab.active { background: #6366f1; color: #fff; }
  .panel { display: none; width: 100%; }
  .panel.active { display: block !important; }
  .form { display: flex; flex-direction: column; gap: 10px; margin-bottom: 16px; width: 100%; }
  input[type=text] { width: 100%; padding: 14px; border-radius: 10px; border: 1px solid #2a2d35; background: #1a1d24; color: #fff; font-size: 15px; outline: none; transition: border 0.2s; }
  input[type=text]:focus { border-color: #6366f1; }
  button { width: 100%; padding: 14px 20px; border-radius: 10px; border: none; background: #6366f1; color: #fff; font-weight: 600; font-size: 15px; cursor: pointer; transition: background 0.2s; }
  button:hover { background: #5457e6; }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  .expiry-row { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; justify-content: center; }
  .exp-opt { flex: 1; min-width: 75px; text-align: center; padding: 10px 8px; border-radius: 8px; border: 1px solid #2a2d35; background: #1a1d24; color: #8a8f98; font-size: 13px; cursor: pointer; }
  .exp-opt.selected { background: #6366f1; border-color: #6366f1; color: #fff; }
  #list { display: grid; grid-template-columns: 1fr; gap: 14px; margin-top: 20px; }
  .item { background: #1a1d24; border: 1px solid #2a2d35; border-radius: 12px; padding: 16px; display: flex; flex-direction: column; gap: 8px; }
  .item.expired { opacity: 0.45; }
  .short { font-size: 16px; font-weight: 600; color: #a5b4fc; word-break: break-all; }
  .orig { font-size: 13px; color: #8a8f98; word-break: break-all; }
  .row { display: flex; flex-direction: column; gap: 12px; margin-top: 6px; border-top: 1px solid #2a2d35; padding-top: 12px; }
  .meta { font-size: 12px; color: #6b7280; }
  .meta.exp-done { color: #f87171; }
  .actions { display: flex; gap: 8px; width: 100%; }
  .actions button { flex: 1; padding: 10px; font-size: 13px; background: #2a2d35; }
  .actions button:hover { background: #363a45; }
  .actions .del { background: #3a1f24; color: #f87171; }
  .actions .del:hover { background: #4a252b; }
  .empty { color: #6b7280; text-align: center; padding: 30px 0; font-size: 15px; }
  .err { color: #f87171; font-size: 14px; margin-bottom: 16px; text-align: left; }
  .result-box { background: #14201c; border: 1px solid #22553f; border-radius: 10px; padding: 16px; margin-top: 16px; font-size: 14px; display: flex; justify-content: space-between; align-items: center; gap: 12px; word-break: break-all; }
  .result-box .url-text { flex: 1; display: flex; flex-direction: column; gap: 4px; }
  .result-box a { color: #6ee7b7; text-decoration: none; font-weight: 500; word-break: break-all; }
  .result-box button { padding: 8px 14px; font-size: 12px; background: #22553f; color: #fff; border: none; border-radius: 6px; cursor: pointer; white-space: nowrap; width: auto; }
  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #1f2937; color: #fff; padding: 12px 24px; border-radius: 8px; font-size: 14px; opacity: 0; transition: opacity 0.2s; pointer-events: none; z-index: 1000; }
  .toast.show { opacity: 1; }
  @media (min-width: 600px) { body { padding: 40px 24px; } .wrap { max-width: 650px; } h1 { font-size: 26px; text-align: left; } p.sub { text-align: left; font-size: 15px; } .form { flex-direction: row; } input[type=text] { flex: 1; } button { width: auto; white-space: nowrap; } .row { flex-direction: row; justify-content: space-between; align-items: center; } .actions { width: auto; } .actions button { flex: none; width: 80px; } }
  @media (min-width: 1024px) { .wrap { max-width: 1000px; } #list { grid-template-columns: 1fr 1fr; gap: 16px; } h1 { font-size: 32px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>🔗 Hybrid Link Shortener (Firebase)</h1>
  <p class="sub">Shorten and track your links with real-time cloud data storage engine syncing.</p>
  
  <div class="tabs">
    <div class="tab active" data-tab="shorten">Shorten Link</div>
    <div class="tab" data-tab="unshorten">Decode / Unshorten</div>
  </div>
  
  <div class="panel active" id="panel-shorten">
    <div class="form"><input type="text" id="urlInput" placeholder="https://example.com/very/long/link" /><button id="shortenBtn">Shorten URL</button></div>
    <div class="err" id="errBox" style="display:none;"></div>
    <div class="expiry-row" id="expiryRow"></div>
  </div>
  
  <div class="panel" id="panel-unshorten">
    <div class="form"><input type="text" id="unshortInput" placeholder="Paste short link or code" /><button id="unshortBtn">Find URL</button></div>
    <div class="err" id="unshortErr" style="display:none;"></div>
    <div id="unshortResult"></div>
  </div>
  
  <div id="list"></div>
</div>
<div class="toast" id="toast"></div>

<script>
// ⚠️ APNI ACTUAL FIREBASE DETAILS YAHAN BHARNA
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  databaseURL: "https://YOUR_PROJECT-default-rtdb.firebaseio.com",
  projectId: "YOUR_PROJECT",
  storageBucket: "YOUR_PROJECT.appspot.com",
  messagingSenderId: "YOUR_ID",
  appId: "YOUR_APP_ID"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const listEl = document.getElementById('list');
const inputEl = document.getElementById('urlInput');
const btnEl = document.getElementById('shortenBtn');
const errBox = document.getElementById('errBox');
const toastEl = document.getElementById('toast');
const expiryRow = document.getElementById('expiryRow');
const unshortInput = document.getElementById('unshortInput');
const unshortBtn = document.getElementById('unshortBtn');
const unshortErr = document.getElementById('unshortErr');
const unshortResult = document.getElementById('unshortResult');

const EXPIRY_OPTIONS = [
  { label: 'Never', ms: null }, { label: '1 hour', ms: 60 * 60 * 1000 },
  { label: '1 day', ms: 24 * 60 * 60 * 1000 }, { label: '7 days', ms: 7 * 24 * 60 * 60 * 1000 }
];
let selectedExpiry = EXPIRY_OPTIONS[2];

function renderExpiryOptions() {
  expiryRow.innerHTML = EXPIRY_OPTIONS.map((opt, i) => `<div class="exp-opt ${opt.label === selectedExpiry.label ? 'selected' : ''}" data-i="${i}">${opt.label}</div>`).join('');
  expiryRow.querySelectorAll('.exp-opt').forEach(el => el.addEventListener('click', () => { selectedExpiry = EXPIRY_OPTIONS[+el.dataset.i]; renderExpiryOptions(); }));
}
renderExpiryOptions();

document.querySelectorAll('.tab').forEach(tab => tab.addEventListener('click', () => {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  tab.classList.add('active'); 
  document.getElementById('panel-' + tab.dataset.tab).classList.add('active');
  
  if(tab.dataset.tab === "shorten") {
    listEl.style.display = "grid";
  } else {
    listEl.style.display = "none";
    unshortResult.innerHTML = '';
    unshortInput.value = '';
    showError(unshortErr, '');
  }
}));

function showToast(msg) { toastEl.textContent = msg; toastEl.classList.add('show'); setTimeout(() => toastEl.classList.remove('show'), 1500); }
function showError(el, msg) { el.textContent = msg; el.style.display = msg ? 'block' : 'none'; }
let knownCodes = new Set();
function genCode() {
  let c = Math.random().toString(36).substring(2, 8);
  while (c.length < 6 || knownCodes.has(c)) c = Math.random().toString(36).substring(2, 8);
  return c;
}
function isValidUrl(str) { try { const u = new URL(str); return u.protocol === 'http:' || u.protocol === 'https:'; } catch { return false; } }

function extractCode(input) {
  const trimmed = input.trim(); if (!trimmed) return '';
  if (trimmed.includes('?go=')) return trimmed.split('?go=')[1].split('&')[0];
  const parts = trimmed.split('/'); return parts[parts.length - 1];
}

function buildShortLink(code) {
  const base = window.location.origin + window.location.pathname;
  return base.endsWith('/') ? base + '?go=' + code : base + '/?go=' + code;
}

function syncLinks() {
  db.ref('links').on('value', (snapshot) => {
    const data = snapshot.val() || {};
    knownCodes = new Set(Object.keys(data));
    const globalLinks = Object.keys(data).map(key => ({ code: key, ...data[key] }));
    render(globalLinks);
  });
}

function render(globalLinks) {
  if (globalLinks.length === 0) { listEl.innerHTML = '<div class="empty">No active cloud links.</div>'; return; }
  listEl.innerHTML = globalLinks.slice().reverse().map(l => {
    const expired = l.expiresAt !== null && l.expiresAt <= Date.now();
    const shortDisplay = buildShortLink(l.code);
    return `
      <div class="item ${expired ? 'expired' : ''}">
        <div class="short">${shortDisplay}</div>
        <div class="orig">${escapeHtml(l.url)}</div>
        <div class="row">
          <span class="meta">${expired ? '<span class="exp-done">Expired</span>' : 'Active global link'}</span>
          <div class="actions">
            ${!expired ? `<button onclick="copyCode('${l.code}')">Copy</button>` : ''}
            <button class="del" onclick="deleteLink('${l.code}')">Delete</button>
          </div>
        </div>
      </div>`;
  }).join('');
}

function escapeHtml(str) { const div = document.createElement('div'); div.textContent = str; return div.innerHTML; }

function shorten() {
  const url = inputEl.value.trim(); showError(errBox, '');
  if (!url || !isValidUrl(url)) { showError(errBox, 'Enter a valid URL starting with http/https'); return; }
  btnEl.disabled = true;
  const code = genCode();
  const expiresAt = selectedExpiry.ms === null ? null : Date.now() + selectedExpiry.ms;
  
  db.ref('links/' + code).set({ url, created: Date.now(), expiresAt }, (err) => {
    btnEl.disabled = false;
    if (err) { showError(errBox, 'Save failed: ' + err.message); return; }
    inputEl.value = ''; showToast('Saved to cloud!');
  });
}

unshortBtn.addEventListener('click', () => {
  showError(unshortErr, ''); unshortResult.innerHTML = '';
  const code = extractCode(unshortInput.value); if (!code) return;
  db.ref('links/' + code).once('value').then(snap => {
    const link = snap.val();
    if (!link || (link.expiresAt && link.expiresAt <= Date.now())) { showError(unshortErr, 'Link not found or expired.'); return; }
    unshortResult.innerHTML = `<div class="result-box"><div class="url-text"><strong>Original URL:</strong><a href="${escapeHtml(link.url)}" target="_blank">${escapeHtml(link.url)}</a></div><button onclick="copyDecodedUrl('${escapeHtml(link.url)}')">Copy</button></div>`;
  }).catch(e => showError(unshortErr, 'Error fetching database data.'));
});

window.copyDecodedUrl = function(u) { navigator.clipboard?.writeText(u).then(() => showToast('Original URL Copied!')); };
window.copyCode = function(c) { navigator.clipboard?.writeText(buildShortLink(c)).then(() => showToast('Short Link Copied!')); };
window.deleteLink = function(c) { db.ref('links/' + c).remove().then(() => showToast('Deleted')); };

btnEl.addEventListener('click', shorten);
syncLinks();

const urlParams = new URLSearchParams(window.location.search);
if (urlParams.has('go')) {
  const c = urlParams.get('go');
  db.ref('links/' + c).once('value').then(snap => {
    const l = snap.val();
    if (l && (!l.expiresAt || l.expiresAt > Date.now())) window.location.replace(l.url);
  });
}
</script>
</body>
</html>
