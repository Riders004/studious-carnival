<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔗 Cloud Link Shortener (JSONBin)</title>
<style>
  /* [Bina chhede styling block pure system ke upar wali hi bilkul same use ho rhi hai] */
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f1115; color: #e6e6e6; min-height: 100vh; padding: 20px 16px; display: flex; justify-content: center; align-items: flex-start; }
  .wrap { width: 100%; max-width: 100%; margin: 0 auto; }
  h1 { font-size: 22px; font-weight: 600; margin-bottom: 6px; color: #fff; text-align: center; }
  p.sub { color: #8a8f98; font-size: 14px; margin-bottom: 24px; text-align: center; }
  .tabs { display: flex; gap: 6px; margin-bottom: 20px; background: #1a1d24; padding: 4px; border-radius: 10px; }
  .tab { flex: 1; text-align: center; padding: 12px 0; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; color: #8a8f98; transition: all 0.2s ease; }
  .tab.active { background: #6366f1; color: #fff; }
  .panel { display: none; }
  .panel.active { display: block; }
  .form { display: flex; flex-direction: column; gap: 10px; margin-bottom: 16px; }
  input[type=text] { width: 100%; padding: 14px; border-radius: 10px; border: 1px solid #2a2d35; background: #1a1d24; color: #fff; font-size: 15px; outline: none; transition: border 0.2s; }
  input[type=text]:focus { border-color: #6366f1; }
  button { padding: 14px 20px; border-radius: 10px; border: none; background: #6366f1; color: #fff; font-weight: 600; font-size: 15px; cursor: pointer; transition: background 0.2s; }
  button:hover { background: #5457e6; }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  #list { display: grid; grid-template-columns: 1fr; gap: 14px; margin-top: 10px; }
  .item { background: #1a1d24; border: 1px solid #2a2d35; border-radius: 12px; padding: 16px; display: flex; flex-direction: column; gap: 8px; }
  .short { font-size: 16px; font-weight: 600; color: #a5b4fc; word-break: break-all; }
  .orig { font-size: 13px; color: #8a8f98; word-break: break-all; }
  .row { display: flex; flex-direction: column; gap: 12px; margin-top: 6px; border-top: 1px solid #2a2d35; padding-top: 12px; }
  .actions { display: flex; gap: 8px; width: 100%; }
  .actions button { flex: 1; padding: 10px; font-size: 13px; background: #2a2d35; }
  .result-box { background: #14201c; border: 1px solid #22553f; border-radius: 10px; padding: 16px; margin-bottom: 16px; font-size: 14px; display: flex; justify-content: space-between; align-items: center; }
  .result-box a { color: #6ee7b7; text-decoration: none; }
  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #1f2937; color: #fff; padding: 12px 24px; border-radius: 8px; font-size: 14px; opacity: 0; transition: opacity 0.2s; pointer-events: none; }
  .toast.show { opacity: 1; }
</style>
</head>
<body>
<div class="wrap">
  <h1>🔗 Global Link Shortener (JSONBin)</h1>
  <p class="sub">Uses online dynamic API bins to sync multiple global links seamlessly.</p>
  <div class="tabs"><div class="tab active" data-tab="shorten">Shorten Link</div><div class="tab" data-tab="unshorten">Decode / Unshorten</div></div>
  <div class="panel active" id="panel-shorten">
    <div class="form"><input type="text" id="urlInput" placeholder="https://example.com" /><button id="shortenBtn">Shorten URL</button></div>
    <div class="err" id="errBox" style="display:none;"></div>
  </div>
  <div class="panel" id="panel-unshorten">
    <div class="form"><input type="text" id="unshortInput" placeholder="Paste short link" /><button id="unshortBtn">Find URL</button></div>
    <div id="unshortResult"></div>
  </div>
  <div id="list"></div>
</div>
<div class="toast" id="toast"></div>

<script>
// ⚠️ APNI API BIN DETAILS YAHAN BHARO
const BIN_ID = "YOUR_BIN_ID_HERE";
const MASTER_KEY = "$2a$10$YOUR_MASTER_KEY_HERE";
const API_URL = `https://api.jsonbin.io/v3/b/${BIN_ID}`;

let globalLinks = {};

async function loadBin() {
  try {
    const res = await fetch(`${API_URL}/latest`, { headers: { "X-Master-Key": MASTER_KEY } });
    const json = await res.json();
    globalLinks = json.record || {};
    render();
    checkRedirect();
  } catch (e) { console.error("Cloud fetch failed", e); }
}

async function saveBin() {
  try {
    await fetch(API_URL, {
      method: "PUT",
      headers: { "Content-Type": "application/json", "X-Master-Key": MASTER_KEY },
      body: JSON.stringify(globalLinks)
    });
    render();
  } catch (e) { alert("Failed to save data to cloud API"); }
}

function render() {
  const listEl = document.getElementById('list');
  const keys = Object.keys(globalLinks);
  if (keys.length === 0) { listEl.innerHTML = '<div class="empty">No links in cloud storage bin.</div>'; return; }
  
  listEl.innerHTML = keys.reverse().map(code => {
    const url = globalLinks[code];
    const base = window.location.origin + window.location.pathname;
    const shortDisplay = base.endsWith('/') ? base + '?go=' + code : base + '/?go=' + code;
    return `
      <div class="item">
        <div class="short">${shortDisplay}</div>
        <div class="orig">${url}</div>
      </div>`;
  }).join('');
}

document.getElementById('shortenBtn').addEventListener('click', async () => {
  const url = document.getElementById('urlInput').value.trim();
  if(!url) return;
  const code = Math.random().toString(36).substring(2, 8);
  globalLinks[code] = url;
  document.getElementById('shortenBtn').disabled = true;
  await saveBin();
  document.getElementById('shortenBtn').disabled = false;
  document.getElementById('urlInput').value = '';
});

function checkRedirect() {
  const urlParams = new URLSearchParams(window.location.search);
  if (urlParams.has('go')) {
    const code = urlParams.get('go');
    if (globalLinks[code]) window.location.replace(globalLinks[code]);
  }
}

loadBin();
</script>
</body>
</html>
